services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${API_ID}
      TELEGRAM_API_HASH: ${API_HASH}
    volumes:
      - ./telegram-bot-api-data:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/ 2>&1 | grep -q '404'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  bot:
    image: ghcr.io/ibrhoom/media-dl-bot:${IMAGE_TAG:-latest}
    container_name: media-dl-bot
    restart: unless-stopped
    depends_on:
      telegram-bot-api:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      API_ID: ${API_ID}
      API_HASH: ${API_HASH}
      LOCAL_API_URL: http://telegram-bot-api:8081
      ALLOWED_USERS: ${ALLOWED_USERS}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-1900}
    volumes:
      - ./downloads:/app/downloads
      - ./logs:/app/logs
    tmpfs:
      - /tmp
